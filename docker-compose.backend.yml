services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/visastore}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AFFILIATE_EMAIL: ${AFFILIATE_EMAIL}
      AFFILIATE_PASSWORD: ${AFFILIATE_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      META_PIXEL_ID: ${META_PIXEL_ID}
      FACEBOOK_ACCESS_TOKEN: ${FACEBOOK_ACCESS_TOKEN}
      API_REQUEST_SECRET: ${API_REQUEST_SECRET}
      ZR_EXPRESS_TENANT_ID: ${ZR_EXPRESS_TENANT_ID}
      ZR_EXPRESS_SECRET_KEY: ${ZR_EXPRESS_SECRET_KEY}
      BAILEYS_API_URL: ${BAILEYS_API_URL}
      BAILEYS_API_KEY: ${BAILEYS_API_KEY}
      OTP_SECRET: ${OTP_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      PRELUDE_API_KEY: ${PRELUDE_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ai
    volumes:
      - ollama_data:/root/.ollama

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mongo_data:
  ollama_data:
  backend_uploads:
  caddy_data:
  caddy_config:
