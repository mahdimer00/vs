[build]
  command = "npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_META_PIXEL_ID = "1523187746118483"

# Block credential/config scanners — return 404 immediately, no SPA fallback
[[redirects]]
  from = "/.env"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.env.*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.git"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/wp-admin"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/phpMyAdmin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/config/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/.well-known/traffic-advice"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/admin"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
